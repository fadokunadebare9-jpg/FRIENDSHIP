<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathe 🤍</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
</head>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fad0c4 100%);
    background-attachment: fixed;
    cursor: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 24 24' fill='none' stroke='%23ff69b4' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='m20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z'/%3E%3C/svg%3E"), auto;
    animation: gentleBreath 6s ease-in-out infinite;
}

.container {
    text-align: center;
    padding: 20px;
}

h1 {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2.5rem, 10vw, 5rem);
    color: #e091a0;
    margin-bottom: 12px;
    text-shadow: 0 0 20px rgba(224, 145, 160, 0.5), 1px 1px 3px rgba(224, 145, 160, 0.3);
    animation: romanticGlow 3s ease-in-out infinite alternate;
}

.step {
    font-family: 'Dancing Script', cursive;
    font-size: 24px;
    color: #c53030;
    font-weight: 600;
    letter-spacing: 1px;
    margin: 25px 0;
    padding: 25px;
    background: linear-gradient(145deg, rgba(255, 245, 247, 0.8), rgba(255, 230, 238, 0.6));
    border-radius: 25px;
    border-left: 6px solid #e53e3e;
    text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
    box-shadow: 0 8px 30px rgba(255, 20, 147, 0.3), inset 0 1px 0 rgba(255,255,255,0.8);
    animation: fadeInUp 0.8s ease-out forwards;
    opacity: 0;
    transform: translateY(30px);
    line-height: 1.6;
}

.step:nth-child(1) { animation-delay: 0.1s; }
.step:nth-child(2) { animation-delay: 0.2s; }
.step:nth-child(3) { animation-delay: 0.3s; }
.step:nth-child(4) { animation-delay: 0.4s; }
.step:nth-child(5) { animation-delay: 0.5s; }

@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes romanticGlow {
  from {
    text-shadow: 0 0 20px rgba(224, 145, 160, 0.5), 1px 1px 3px rgba(224, 145, 160, 0.3);
  }
  to {
    text-shadow: 0 0 30px rgba(224, 145, 160, 0.8), 0 0 40px rgba(255, 182, 193, 0.6);
  }
}

@keyframes gentleBreath {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

.back-btn {
    padding: 15px 40px;
    border: none;
    border-radius: 35px;
    font-family: 'Dancing Script', cursive;
    font-weight: 700;
    font-size: 20px;
    color: white;
    background: linear-gradient(135deg, #ff69b4, #ff1493, #ffc0cb);
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255, 105, 180, 0.4), inset 0 1px 0 rgba(255,255,255,0.3);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    margin-top: 30px;
}

.back-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    transition: left 0.5s;
}

.back-btn:hover::before {
    left: 100%;
}

.back-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 10px 30px rgba(255, 105, 180, 0.6);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(247, 140, 160, 0.5);
}
</style>
<body>
<div class="container">
    <canvas id="heartsCanvas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: -1;"></canvas>
    <h1>Breathe, Baraka 💕🤍</h1>
    <div class="step">1. 💕 Take 5 deep breaths slowly</div>
    <div class="step">2. 💕 Step away from your books for 10 minutes</div>
    <div class="step">3. 💕 Drink some water & eat something small</div>
    <div class="step">4. 💕 Write down only 3 tasks for today, ignore the rest</div>
    <div class="step">5. 💕 Play one song that makes you feel safe</div>
    <a href="index.html" class="back-btn">Back to Love 💌</a>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  const canvas = document.getElementById('heartsCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  let hearts = [];
  
  class Heart {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = canvas.height + 20;
      this.size = Math.random() * 15 + 8;
      this.speedY = Math.random() * 2 + 0.5;
      this.speedX = Math.random() * 1.5 - 0.75;
      this.opacity = Math.random() * 0.4 + 0.2;
    }
    update() {
      this.y -= this.speedY;
      this.x += this.speedX;
      this.opacity -= 0.004;
      if (this.y < 0 || this.opacity <= 0) {
        this.y = canvas.height + 20;
        this.opacity = Math.random() * 0.4 + 0.2;
      }
    }
    draw() {
      ctx.save();
      ctx.globalAlpha = this.opacity;
      ctx.fillStyle = 'rgba(255, 105, 180, ' + this.opacity + ')';
      ctx.font = this.size + 'px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('💖', this.x, this.y);
      ctx.restore();
    }
  }
  
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (hearts.length < 15) hearts.push(new Heart());
    hearts.forEach((heart, i) => {
      heart.update();
      heart.draw();
      if (heart.opacity <= 0) hearts.splice(i, 1);
    });
    requestAnimationFrame(animate);
  }
  
  animate();
  
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
});
</script>
</body>
</html>
